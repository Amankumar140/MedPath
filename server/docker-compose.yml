version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medpath_backend_app
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/medpath?schema=public
      - REDIS_URL=redis://redis:6379
      - PYTHON_SERVICE_URL=${PYTHON_SERVICE_URL:-http://localhost:8000}
    depends_on:
      - db
      - redis
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - medpath_network

  db:
    image: postgres:15-alpine
    container_name: medpath_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medpath
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medpath_network

  redis:
    image: redis:7-alpine
    container_name: medpath_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - medpath_network

volumes:
  postgres_data:
  redis_data:

networks:
  medpath_network:
    driver: bridge
