<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50/50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedPath Core | Premium Triage Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        .dreamy-glow {
            background: linear-gradient(135deg, rgba(248,250,252,0.8) 0%, rgba(238,242,255,0.4) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .message-bubble-ai {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(226, 232, 240, 0.9);
            box-shadow: 0 4px 14px -4px rgba(148, 163, 184, 0.08);
        }
        /* Custom scrollbar matching soft accents */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    </style>
</head>
<body class="h-full font-sans antialiased text-slate-700 flex flex-col relative overflow-hidden bg-gradient-to-br from-[#F8FAFC] via-[#EEF2FF]/30 to-[#F1F5F9]">

    <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-indigo-200/20 rounded-full blur-[140px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-emerald-200/20 rounded-full blur-[140px] pointer-events-none"></div>

    <header class="bg-white/70 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex items-center justify-between border-b border-slate-200/60">
        <div class="flex items-center space-x-3">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 flex items-center justify-center font-bold text-white shadow-md shadow-indigo-200">
                M
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-slate-900">MedPath Core</h1>
                <p class="text-[11px] text-slate-500 font-medium tracking-wide">Unified Medical Decision Space</p>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <div id="session-badge" class="hidden sm:flex items-center space-x-2 text-[11px] bg-slate-100 px-2.5 py-1 rounded-lg border border-slate-200 text-slate-600">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                <span>ID: <span id="session-display-id" class="font-mono font-medium text-slate-800"></span></span>
            </div>
            <button onclick="resetSession()" class="text-xs bg-white hover:bg-slate-50 text-slate-700 px-3 py-1.5 rounded-lg transition border border-slate-200 font-semibold shadow-sm">
                Clear Case
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto p-3 sm:p-6 flex flex-col overflow-hidden relative z-10">
        
        <div class="flex-1 flex flex-col dreamy-glow rounded-2xl overflow-hidden relative shadow-xl shadow-slate-200/40">
            
            <div class="px-4 py-2.5 bg-white/40 border-b border-slate-200/60 flex items-center justify-between text-xs font-medium text-slate-500">
                <span>CONVERSATION WORKSPACE</span>
                <span id="triage-status" class="bg-indigo-50 text-indigo-600 px-2.5 py-0.5 rounded-full font-semibold border border-indigo-100">Awaiting Symptoms</span>
            </div>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6">
                <div class="flex items-start space-x-3 max-w-[88%]">
                    <div class="w-8 h-8 rounded-lg bg-slate-100 border border-slate-200 flex items-center justify-center text-xs font-bold text-slate-600 flex-shrink-0">AI</div>
                    <div class="message-bubble-ai p-4 rounded-2xl rounded-tl-none text-sm leading-relaxed text-slate-800">
                        Welcome to MedPath Core. Please describe the symptoms, conditions, or clinical discomfort the patient is currently experiencing.
                    </div>
                </div>
            </div>

            <div id="engine-loader-panel" class="hidden px-6 py-4 bg-white border-t border-slate-200/80 space-y-2.5 transition-all duration-300">
                <div class="flex items-center justify-between text-xs">
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 rounded-full border-2 border-indigo-100 border-t-indigo-600 animate-spin"></div>
                        <span id="loader-status-text" class="font-semibold text-slate-700">Executing research data...</span>
                    </div>
                    <span class="text-indigo-600 font-bold uppercase tracking-wider text-[10px] bg-indigo-50 px-2 py-0.5 rounded border border-indigo-100">Live Agent Stream</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                    <div id="loader-progress-bar" class="bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500 h-1.5 w-[15%] transition-all duration-300 ease-out"></div>
                </div>
            </div>

            <form id="chat-form" onsubmit="submitMessage(event)" class="p-3 bg-white border-t border-slate-200/80 flex items-center space-x-3">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Describe symptoms... (e.g., 'Papa ke chest me pain h, age 55, Noida sec 62')" 
                    required 
                    autocomplete="off"
                    class="flex-1 bg-slate-50 border border-slate-200 focus:border-indigo-400 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-100 rounded-xl px-4 py-3 text-sm placeholder-slate-400 text-slate-800 transition-all duration-200"
                >
                <button type="submit" id="send-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm px-5 py-3 rounded-xl transition-all duration-150 shadow-md shadow-indigo-100 flex items-center space-x-1.5 flex-shrink-0">
                    <span>Send</span>
                    <svg class="w-3.5 h-3.5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </form>
        </div>
    </main>

    <script>
        const BACKEND_API_BASE = "/api/chat"; 
        let activeSessionId = "";

        window.addEventListener('DOMContentLoaded', () => { resetSession(); });

        function resetSession() {
            activeSessionId = "CASE-" + Math.random().toString(36).substring(2, 11).toUpperCase();
            document.getElementById('session-display-id').innerText = activeSessionId;
            document.getElementById('session-badge').classList.remove('hidden');
            
            document.getElementById('chat-box').innerHTML = `
                <div class="flex items-start space-x-3 max-w-[88%]">
                    <div class="w-8 h-8 rounded-lg bg-slate-100 border border-slate-200 flex items-center justify-center text-xs font-bold text-slate-600 flex-shrink-0">AI</div>
                    <div class="message-bubble-ai p-4 rounded-2xl rounded-tl-none text-sm leading-relaxed text-slate-800">
                        Welcome to MedPath Core. Please describe the symptoms, conditions, or clinical discomfort the patient is currently experiencing.
                    </div>
                </div>`;
                
            document.getElementById('triage-status').innerText = "Awaiting Symptoms";
            document.getElementById('triage-status').className = "bg-indigo-50 text-indigo-600 px-2.5 py-0.5 rounded-full font-semibold border border-indigo-100";
            document.getElementById('engine-loader-panel').classList.add('hidden');
            document.getElementById('user-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
        }

        // Dynamically maps step increments to the single research progress bar
        function animateProgressBar(text) {
            const panel = document.getElementById('engine-loader-panel');
            const statusTxt = document.getElementById('loader-status-text');
            const bar = document.getElementById('loader-progress-bar');
            
            panel.classList.remove('hidden');
            statusTxt.innerText = text;

            if (text.includes("🔍") || text.includes("Parsing")) bar.style.width = "25%";
            else if (text.includes("✅") || text.includes("Locked")) bar.style.width = "45%";
            else if (text.includes("🌐") || text.includes("Tavily")) bar.style.width = "65%";
            else if (text.includes("🕷️") || text.includes("Playwright")) bar.style.width = "85%";
            else if (text.includes("🧮") || text.includes("Matrix")) bar.style.width = "95%";
        }

        function showChatThinkingIndicator() {
            const box = document.getElementById('chat-box');
            if (document.getElementById('chat-thinking-indicator')) return;
            
            const div = document.createElement('div');
            div.id = "chat-thinking-indicator";
            div.className = "flex items-start space-x-3 max-w-[88%] animate-pulse";
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-indigo-50 border border-indigo-100 flex items-center justify-center text-xs font-bold text-indigo-600 flex-shrink-0">⚙️</div>
                <div class="message-bubble-ai p-4 rounded-2xl rounded-tl-none text-sm text-slate-500 italic flex items-center space-x-2">
                    <span>Analyzing clinical metrics and processing registries...</span>
                    <span class="flex space-x-1">
                        <span class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></span>
                        <span class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></span>
                        <span class="w-1.5 h-1.5 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></span>
                    </span>
                </div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function removeChatThinkingIndicator() {
            const indicator = document.getElementById('chat-thinking-indicator');
            if (indicator) indicator.remove();
        }

        async function submitMessage(event) {
            event.preventDefault();
            const inputField = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const inputVal = inputField.value.trim();
            if (!inputVal) return;

            // 1. Output User text bubble
            appendUserBubble(inputVal);
            inputField.value = "";
            
            // 2. Lock controls
            inputField.disabled = true;
            sendBtn.disabled = true;
            
            // 3. Inject inline chat thinking indicator
            showChatThinkingIndicator();

            try {
                // 4. Request chunked text/plain stream connection from server
                const response = await fetch(BACKEND_API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: activeSessionId, user_input: inputVal })
                });

                if (!response.ok) throw new Error("Network response encountered a routing error.");

                // 5. Initialize Stream Reader processing loops
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // Hold onto partial line strings

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        const chunk = JSON.parse(line);

                        if (chunk.type === "status") {
                            // Update live progress bars smoothly
                            animateProgressBar(chunk.message);
                        } 
                        else if (chunk.type === "final") {
                            // Shut off loader panel and chat indicator bubble
                            document.getElementById('engine-loader-panel').classList.add('hidden');
                            removeChatThinkingIndicator();
                            
                            if (chunk.is_complete === false) {
                                document.getElementById('triage-status').innerText = "Context Fragmented";
                                document.getElementById('triage-status').className = "bg-amber-50 text-amber-600 px-2.5 py-0.5 rounded-full font-semibold border border-amber-100";
                                appendAiResponseBubble(chunk.message);
                            } else {
                                document.getElementById('triage-status').innerText = "Context Complete";
                                document.getElementById('triage-status').className = "bg-emerald-50 text-emerald-700 px-2.5 py-0.5 rounded-full font-semibold border border-emerald-100";
                                
                                // Render integrated results block right inside the timeline chain!
                                appendFinalTimelineReport(chunk.message, chunk.data.recommended_hospitals || []);
                            }
                        }
                        else if (chunk.type === "error") {
                            throw new Error(chunk.message);
                        }
                    }
                }

            } catch (err) {
                console.error(err);
                document.getElementById('engine-loader-panel').classList.add('hidden');
                removeChatThinkingIndicator();
                appendAiResponseBubble(`⚠️ System connection failure: ${err.message}. Ensure your python main.py is running.`);
            } finally {
                // Re-enable input controls
                inputField.disabled = false;
                sendBtn.disabled = false;
                inputField.focus();
            }
        }

        function appendUserBubble(text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = "flex items-start justify-end space-x-3 w-full animate-fade-in";
            div.innerHTML = `
                <div class="bg-indigo-600 text-white p-3.5 rounded-2xl rounded-tr-none text-sm leading-relaxed max-w-[85%] shadow-md shadow-indigo-100">
                    ${text}
                </div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function appendAiResponseBubble(text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = "flex items-start space-x-3 max-w-[88%] animate-fade-in";
            div.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-slate-100 border border-slate-200 flex items-center justify-center text-xs font-bold text-slate-600 flex-shrink-0">AI</div>
                <div class="message-bubble-ai p-4 rounded-2xl rounded-tl-none text-sm leading-relaxed text-slate-800">
                    ${text}
                </div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Beautifully blends the final recommendations inside the unified chat thread layout
        function appendFinalTimelineReport(aiIntroMessage, hospitals) {
            const box = document.getElementById('chat-box');
            const reportContainer = document.createElement('div');
            reportContainer.className = "space-y-4 max-w-full w-full animate-fade-in";

            // Header line for the response matching responsive grid standards
            let htmlPayload = `
                <div class="flex items-start space-x-3">
                    <div class="w-8 h-8 rounded-lg bg-indigo-50 border border-indigo-100 flex items-center justify-center text-xs font-bold text-indigo-600 flex-shrink-0">🩺</div>
                    <div class="message-bubble-ai p-4 rounded-2xl rounded-tl-none text-sm leading-relaxed text-slate-800 font-medium w-full">
                        ${aiIntroMessage}
                    </div>
                </div>
                <div class="pl-0 sm:pl-11 grid grid-cols-1 md:grid-cols-2 gap-4 mt-3 w-full">
            `;

            // Loop through each structured entity card inside the text response window
            hospitals.forEach((hosp) => {
                // Build true Google Maps Universal Intent links via coordinates if provided by backend, otherwise use name link
                let mapsQueryUrl = "";
                if (hosp.latitude && hosp.longitude) {
                    mapsQueryUrl = `https://www.google.com/maps/dir/?api=1&destination=${hosp.latitude},${hosp.longitude}`;
                } else {
                    mapsQueryUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(hosp.hospital_name)}`;
                }
                
                let rankColor = "bg-slate-100 text-slate-700 border-slate-300";
                if(hosp.ranking_position === 1) rankColor = "bg-emerald-50 text-emerald-700 border-emerald-200";
                if(hosp.ranking_position === 2) rankColor = "bg-indigo-50 text-indigo-700 border-indigo-200";

                htmlPayload += `
                    <div class="bg-white rounded-xl border border-slate-200 p-5 shadow-sm space-y-4 relative overflow-hidden transition-all hover:border-slate-300 hover:shadow-md flex flex-col justify-between">
                        <div class="space-y-3">
                            <div class="flex items-start justify-between flex-wrap gap-2">
                                <div class="flex items-center space-x-2.5">
                                    <span class="text-xs font-bold font-mono border px-2 py-0.5 rounded-lg ${rankColor}">
                                        RANK #${hosp.ranking_position}
                                </span>
                                    <h4 class="text-sm font-bold text-slate-900 tracking-tight">${hosp.hospital_name}</h4>
                                </div>
                                <span class="text-[11px] font-bold text-emerald-700 bg-emerald-50 border border-emerald-100 px-2.5 py-0.5 rounded-full">
                                    Match Reliability: ${Math.round(hosp.confidence_score * 100)}%
                                </span>
                            </div>

                            <div class="flex flex-wrap gap-3 text-xs text-slate-500 font-medium">
                                <div class="flex items-center space-x-1"><span>📍</span> <span>${hosp.distance}</span></div>
                                <div class="flex items-center space-x-1"><span>💰</span> <span>Cost: <span class="text-slate-800 font-semibold">${hosp.estimated_cost}</span></span></div>
                                <div class="flex items-center space-x-1"><span>⭐️</span> <span>Trust Index: <span class="text-indigo-600 font-bold">${hosp.trust_score}</span></span></div>
                            </div>

                            <div class="bg-slate-50 border border-slate-100 rounded-xl p-3.5 text-xs text-slate-700 leading-relaxed">
                                <span class="text-[10px] uppercase font-bold text-slate-400 tracking-wider block mb-1">Clinical Specialization Index</span>
                                ${hosp.suitability}
                            </div>

                            <p class="text-xs text-slate-500 leading-relaxed pt-1">
                                <span class="font-bold text-slate-600">Decision Reasoning:</span> ${hosp.explanation}
                            </p>
                        </div>

                        <div class="border-t border-slate-100 pt-3 flex justify-end mt-2">
                            <a href="${mapsQueryUrl}" target="_blank" class="text-xs bg-slate-900 hover:bg-slate-800 text-white font-semibold px-4 py-2 rounded-lg shadow-sm transition flex items-center space-x-1.5">
                                <span>Get Directions</span>
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </a>
                        </div>
                    </div>
                `;
            });

            htmlPayload += `</div>`; // Close grid container wrapper block
            reportContainer.innerHTML = htmlPayload;
            box.appendChild(reportContainer);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
